# docker-compose.postgres.yml — ExcaliDash with PostgreSQL
#
# Quick start:
#   docker compose -f docker-compose.postgres.yml up -d
#
# Build from source (uses backend/Dockerfile with DB_PROVIDER=postgresql):
#   docker compose -f docker-compose.postgres.yml build
#   docker compose -f docker-compose.postgres.yml up -d
#
# For production with published images, use the pre-built PostgreSQL tags:
#   image: zimengxiong/excalidash-backend:latest-postgres
# (or pin to a release: zimengxiong/excalidash-backend:0.5.0-postgres)

services:
  postgres:
    image: postgres:16-alpine
    container_name: excalidash-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-excalidash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-excalidash}
      POSTGRES_DB: ${POSTGRES_DB:-excalidash}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - excalidash-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-excalidash}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        DB_PROVIDER: postgresql
    container_name: excalidash-backend
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-excalidash}:${POSTGRES_PASSWORD:-excalidash}@postgres:5432/${POSTGRES_DB:-excalidash}
      - DB_PROVIDER=postgresql
      - PORT=8000
      - NODE_ENV=production
      - AUTH_MODE=${AUTH_MODE:-local}
      # Keep disabled by default; only enable when a trusted proxy sanitizes forwarded headers.
      - TRUST_PROXY=false
      # Optional for single-instance deployments:
      # if unset, backend auto-generates and persists one in the volume.
      # Recommended to set explicitly for portability and multi-instance setups.
      - JWT_SECRET=${JWT_SECRET}
      - CSRF_SECRET=${CSRF_SECRET}
      # Optional OIDC settings (required for AUTH_MODE=hybrid or oidc_enforced)
      # - OIDC_PROVIDER_NAME=Authentik
      # - OIDC_ISSUER_URL=https://auth.example.com/application/o/excalidash/
      # - OIDC_CLIENT_ID=your-client-id
      # - OIDC_CLIENT_SECRET=your-client-secret
      # - OIDC_REDIRECT_URI=https://excalidash.example.com/api/auth/oidc/callback
    volumes:
      - backend-data:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - excalidash-network
    restart: unless-stopped
    healthcheck:
      # Use IPv4 loopback explicitly to avoid IPv6 localhost resolution issues.
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:8000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: excalidash-frontend
    ports:
      - "6767:80"
    environment:
      # Backend URL for nginx proxy (host:port format, no protocol)
      # Override for reverse proxy setups (e.g., excalidash-backend.svc.cluster.local:8000)
      - BACKEND_URL=backend:8000
    depends_on:
      - backend
    networks:
      - excalidash-network
    restart: unless-stopped
    healthcheck:
      # Use IPv4 loopback explicitly to avoid IPv6 localhost resolution issues.
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:80",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  excalidash-network:
    driver: bridge

volumes:
  postgres-data:
  backend-data:
